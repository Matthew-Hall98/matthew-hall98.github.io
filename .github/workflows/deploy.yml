name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          CI: true

      - name: Prepare deployment
        if: github.ref == 'refs/heads/main'
        run: |
          # Copy dist contents to root (except .git and node_modules)
          for file in dist/*; do
            if [ "$(basename "$file")" != ".git" ] && [ "$(basename "$file")" != "node_modules" ]; then
              cp -r "$file" "$(basename "$file")"
            fi
          done

      - name: Commit and push changes
        if: github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/ index.html coin-sound.mp3 robots.txt lovable-uploads/ placeholder.svg .nojekyll
          if ! git diff --cached --quiet; then
            git commit -m "ci: rebuild and deploy"
            git push
          fi
